<app-table-view>
  <app-table-view-header label="Clients">
    <app-create-client />
  </app-table-view-header>
  <p-table [value]="clients()" [paginator]="true" [rows]="10">
    <ng-template #header>
      <tr>
        <th>id</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Creation date</th>
      </tr>
    </ng-template>
    <ng-template #body let-client>
      <tr [routerLink]="client.id">
        <td>{{ client.id }}</td>
        <td>{{ client.name }}</td>
        <td>{{ client.email }}</td>
        <td>{{ client.phone }}</td>
        <td>{{ client.creation_date | relativeTime }}</td>
      </tr>
    </ng-template>
  </p-table>
</app-table-view>
