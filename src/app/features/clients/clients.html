<app-table-view>
  <app-table-view-header label="Clients">
    <app-create-client (clientCreated)="fetchClients()" />
  </app-table-view-header>
  <p-table #dt1 [value]="clients()" [globalFilterFields]="['name']" [paginator]="true" [rows]="10">
    <ng-template #caption>
      <div class="flex">
        <input
          pInputText
          type="text"
          placeholder="Search name"
          (input)="dt1.filterGlobal($event.target.value, 'contains')"
        />
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th>id</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Creation date</th>
      </tr>
    </ng-template>
    <ng-template #body let-client>
      <tr [routerLink]="client.id">
        <td>{{ client.id }}</td>
        <td>{{ client.name }}</td>
        <td>{{ client.email }}</td>
        <td>{{ client.phone }}</td>
        <td>{{ client.creation_date | relativeTime }}</td>
      </tr>
    </ng-template>
  </p-table>
</app-table-view>
